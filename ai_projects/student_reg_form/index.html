<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        padding:30px;
    }

    .container{
        max-width:1000px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    .btn{
        padding:10px 15px;
        border:none;
        border-radius:5px;
        cursor:pointer;
        color:white;
        margin-right:5px;
    }

    .add-btn{
        background:#28a745;
    }

    .update-btn{
        background:#007bff;
    }

    .edit-btn{
        background:#ffc107;
        color:black;
    }

    .delete-btn{
        background:#dc3545;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    table th,
    table td{
        border:1px solid #ddd;
        padding:10px;
        text-align:center;
    }

    table th{
        background:#007bff;
        color:white;
    }

    tr:nth-child(even){
        background:#f9f9f9;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Student Registration Form</h1>

    <form id="studentForm">
        <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="studentId" required>
        </div>

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="studentName" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="studentEmail" required>
        </div>

        <div class="form-group">
            <label>Course</label>
            <input type="text" id="studentCourse" required>
        </div>

        <button type="submit" class="btn add-btn">Add Student</button>
        <button type="button" class="btn update-btn" id="updateBtn" style="display:none;">
            Update Student
        </button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
    </table>
</div>

<script>
let students = [];
let editIndex = null;

const form = document.getElementById("studentForm");
const updateBtn = document.getElementById("updateBtn");
const tableBody = document.getElementById("studentTableBody");

function renderTable() {
    tableBody.innerHTML = "";

    students.forEach((student, index) => {
        const row = `
            <tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.course}</td>
                <td>
                    <button class="btn edit-btn" onclick="editStudent(${index})">
                        Edit
                    </button>
                    <button class="btn delete-btn" onclick="deleteStudent(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const student = {
        id: document.getElementById("studentId").value,
        name: document.getElementById("studentName").value,
        email: document.getElementById("studentEmail").value,
        course: document.getElementById("studentCourse").value
    };

    students.push(student);

    renderTable();
    form.reset();
});

function editStudent(index) {
    editIndex = index;

    document.getElementById("studentId").value =
        students[index].id;

    document.getElementById("studentName").value =
        students[index].name;

    document.getElementById("studentEmail").value =
        students[index].email;

    document.getElementById("studentCourse").value =
        students[index].course;

    updateBtn.style.display = "inline-block";
}

updateBtn.addEventListener("click", function() {

    students[editIndex] = {
        id: document.getElementById("studentId").value,
        name: document.getElementById("studentName").value,
        email: document.getElementById("studentEmail").value,
        course: document.getElementById("studentCourse").value
    };

    renderTable();

    form.reset();
    updateBtn.style.display = "none";
    editIndex = null;
});

function deleteStudent(index) {
    if(confirm("Are you sure you want to delete this student?")) {
        students.splice(index, 1);
        renderTable();
    }
}
</script>

</body>
</html>
